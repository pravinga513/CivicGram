<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicGram | Social Progress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- Leaflet Map Assets -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --ig-blue: #0095f6;
            --brand-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa; 
            color: #000;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Dashboard Layout */
        #app-shell {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        #sidebar {
            width: 245px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            border-right: 1px solid #efefef;
            padding: 2rem 1rem;
            display: none;
            flex-direction: column;
            background: #fff;
            z-index: 100;
        }

        #main-content {
            flex: 1;
            margin-left: 0;
            max-width: 100%;
            display: flex;
            flex-direction: column;
        }

        #viewport {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding-bottom: 80px; 
        }

        @media (min-width: 768px) {
            #sidebar { display: flex; }
            #main-content { margin-left: 245px; }
            #viewport { padding-bottom: 2rem; }
            #bottom-nav { display: none; }
            header { display: none; } 
        }

        .logo-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            letter-spacing: -1.5px;
            font-style: italic;
        }

        .story-ring {
            padding: 2px;
            background: var(--brand-gradient);
            border-radius: 50%;
        }

        .page-transition { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.8rem 1rem;
            margin: 0.2rem 0;
            border-radius: 8px;
            color: #262626;
            font-weight: 400;
            transition: background 0.2s;
            cursor: pointer;
        }
        .nav-link:hover { background: #fafafa; }
        .nav-link.active { font-weight: 700; color: #000; }
        .nav-link i { margin-right: 1rem; stroke-width: 2px; }

        .action-icon { transition: transform 0.1s ease; cursor: pointer; }
        .action-icon:active { transform: scale(1.2); }

        .btn-blue {
            background-color: var(--ig-blue);
            color: white;
            font-weight: 600;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            transition: opacity 0.2s;
        }
        .btn-blue:disabled { opacity: 0.4; cursor: not-allowed; }

        .post-card {
            background: white;
            border-bottom: 1px solid #efefef;
            padding-bottom: 1.5rem;
        }
        @media (min-width: 768px) {
            .post-card {
                border: 1px solid #efefef;
                border-radius: 8px;
                margin-top: 1.5rem;
            }
        }

        /* Image Grid System */
        .image-grid { display: grid; gap: 2px; background: #fff; width: 100%; aspect-ratio: 1/1; overflow: hidden; cursor: pointer; }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .grid-3 .grid-item:first-child { grid-row: span 2; }
        .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        
        .grid-item { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.2s; }
        .grid-item:hover { opacity: 0.9; }

        .upload-wrapper { position: relative; cursor: pointer; overflow: hidden; }
        .upload-wrapper input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            z-index: 30;
        }

        .upload-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 25;
            backdrop-filter: blur(2px);
            pointer-events: none;
        }

        #map-container { height: calc(100vh - 120px); width: 100%; z-index: 10; }
        @media (min-width: 768px) { #map-container { height: calc(100vh - 40px); border-radius: 12px; margin-top: 20px; } }
        
        /* Fullscreen Viewer */
        #fullscreen-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-image {
            max-width: 95%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 4px;
        }

        .avatar-lg {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden; /* Added to ensure clipping */
            border: 1px solid #efefef;
        }

        .social-chip {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            background: #f1f5f9;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: #475569;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .leaflet-popup-content-wrapper { border-radius: 16px; padding: 0; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .leaflet-popup-content { margin: 0 !important; width: 240px !important; }
    </style>
</head>
<body>

    <!-- FULLSCREEN IMAGE VIEW OVERLAY -->
    <div id="fullscreen-overlay">
        <button onclick="closeFullscreen()" class="absolute top-6 right-6 text-white p-2 hover:bg-white/10 rounded-full transition-colors">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>
        <button id="fs-prev" class="absolute left-4 top-1/2 -translate-y-1/2 text-white p-4 hover:bg-white/10 rounded-full transition-colors hidden">
            <i data-lucide="chevron-left" class="w-10 h-10"></i>
        </button>
        <button id="fs-next" class="absolute right-4 top-1/2 -translate-y-1/2 text-white p-4 hover:bg-white/10 rounded-full transition-colors hidden">
            <i data-lucide="chevron-right" class="w-10 h-10"></i>
        </button>
        <img id="fullscreen-img" class="fullscreen-image scale-in-center animate-in fade-in zoom-in duration-300">
        <div id="fs-counter" class="absolute bottom-10 text-white font-bold text-sm bg-black/50 px-4 py-1 rounded-full uppercase tracking-widest"></div>
    </div>

    <div id="app-shell">
        <aside id="sidebar">
            <h1 onclick="window.location.hash = '#/feed'" class="logo-font text-2xl mb-10 px-4 cursor-pointer select-none text-slate-900">CivicGram</h1>
            <nav class="flex-1">
                <div onclick="window.location.hash = '#/feed'" class="nav-link" data-route="feed"><i data-lucide="home"></i><span>Home</span></div>
                <div onclick="window.location.hash = '#/search'" class="nav-link" data-route="search"><i data-lucide="search"></i><span>Search</span></div>
                <div onclick="window.location.hash = '#/create'" class="nav-link" data-route="create"><i data-lucide="plus-square"></i><span>Create</span></div>
                <div onclick="window.location.hash = '#/map'" class="nav-link" data-route="map"><i data-lucide="map-pin"></i><span>Map</span></div>
                <div onclick="window.location.hash = '#/notifications'" class="nav-link" data-route="notifications"><i data-lucide="heart"></i><span>Notifications</span></div>
                <div onclick="window.location.hash = '#/profile'" class="nav-link" data-route="profile">
                    <div id="sidebar-avatar" class="w-6 h-6 rounded-full bg-slate-100 mr-4 flex items-center justify-center text-[10px] font-bold border border-slate-200 uppercase overflow-hidden text-slate-800">
                        <i data-lucide="user" class="w-4 h-4"></i>
                    </div>
                    <span>Profile</span>
                </div>
            </nav>
            <div class="px-4 mt-auto" id="sidebar-auth-zone"><button onclick="window.location.hash = '#/auth'" class="btn-blue w-full">Log In</button></div>
        </aside>

        <div id="main-content">
            <header class="sticky top-0 glass-header px-4 py-3 flex justify-between items-center shrink-0 md:hidden bg-white/95 backdrop-blur-md border-b border-slate-100 z-50">
                <h1 onclick="window.location.hash = '#/feed'" class="logo-font text-2xl cursor-pointer text-slate-900">CivicGram</h1>
                <div class="flex items-center space-x-4">
                    <button onclick="window.location.hash = '#/notifications'" class="relative"><i data-lucide="heart" class="w-6 h-6 text-slate-900"></i><span id="notif-badge" class="hidden absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span></button>
                    <div id="mobile-auth-header"><i data-lucide="log-in" class="w-6 h-6 text-slate-900" onclick="window.location.hash = '#/auth'"></i></div>
                </div>
            </header>

            <main id="viewport" class="page-transition">
                <div class="h-96 flex items-center justify-center"><div class="w-6 h-6 border-2 border-slate-200 border-t-slate-800 rounded-full animate-spin"></div></div>
            </main>

            <nav id="bottom-nav" class="fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center py-3 px-2 z-50 md:hidden">
                <button onclick="window.location.hash = '#/feed'" class="nav-btn p-1 text-slate-400" data-route="feed"><i data-lucide="home" class="w-7 h-7"></i></button>
                <button onclick="window.location.hash = '#/search'" class="nav-btn p-1 text-slate-400" data-route="search"><i data-lucide="search" class="w-7 h-7"></i></button>
                <button onclick="window.location.hash = '#/create'" class="nav-btn p-1 text-slate-400" data-route="create"><i data-lucide="plus-square" class="w-7 h-7"></i></button>
                <button onclick="window.location.hash = '#/map'" class="nav-btn p-1 text-slate-400" data-route="map"><i data-lucide="map-pin" class="w-7 h-7"></i></button>
                <button onclick="window.location.hash = '#/profile'" class="nav-btn p-1 text-slate-400" data-route="profile"><div id="nav-avatar-circle" class="w-7 h-7 rounded-full bg-slate-50 border border-slate-200 flex items-center justify-center overflow-hidden text-[10px] font-bold uppercase text-slate-800"><i data-lucide="user" class="w-5 h-5"></i></div></button>
            </nav>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[110] w-72 pointer-events-none flex flex-col items-center md:bottom-10"></div>

    <script type="text/javascript">
        // --- 1. CONFIGURATION ---
        const IMGBB_API_KEY = '0abf983309932d2a2eeb289d53d7c55c';
        const SB_URL = 'https://lsfdeyayvdyohbjnqizt.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzZmRleWF5dmR5b2hiam5xaXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MDk5NTAsImV4cCI6MjA4NzI4NTk1MH0.7FonFhSDEqA6jfiT4JulxBZT_eIhIHvwoMycdyZlhC4';
        
        if (!window.civicSb) { window.civicSb = window.supabase.createClient(SB_URL, SB_KEY); }
        const sb = window.civicSb;

        // --- 2. APP STATE ---
        const state = { 
            user: null, posts: [], notifications: [], myLikes: [],
            authMode: 'login', categories: ['Roads', 'Trash', 'Safety', 'Lights', 'Water', 'Parks'],
            isUploading: false, tempImageUrls: [],
            currentLat: null, currentLng: null,
            currentView: null,
            fsGallery: [], fsIndex: 0
        };

        // --- 3. ROUTER ---
        async function handleNavigation() {
            const viewport = document.getElementById('viewport');
            const hash = window.location.hash || '#/feed';
            const parts = hash.split('/');
            const route = parts[1] || 'feed';
            const param = parts[2];

            const viewKey = route + (param || '');
            if (state.currentView === viewKey && route !== 'feed') return; 
            state.currentView = viewKey;

            if (['create', 'notifications', 'edit-profile'].includes(route) && !state.user) { window.location.hash = '#/auth'; return; }

            document.querySelectorAll('.nav-link, .nav-btn').forEach(btn => {
                const isActive = btn.getAttribute('data-route') === route;
                btn.classList.toggle('active', isActive);
                if (btn.classList.contains('nav-btn')) {
                    btn.classList.toggle('text-slate-900', isActive);
                    btn.classList.toggle('text-slate-400', !isActive);
                }
            });

            if (route !== 'create' && route !== 'edit-profile') { state.tempImageUrls = []; state.isUploading = false; }

            window.scrollTo(0, 0);

            switch(route) {
                case 'feed': renderFeed(viewport); break;
                case 'auth': renderAuth(viewport); break;
                case 'create': renderCreate(viewport); break;
                case 'profile': renderProfile(viewport, param); break;
                case 'edit-profile': renderEditProfile(viewport); break;
                case 'notifications': renderNotifications(viewport); break;
                case 'post': renderPostDetail(viewport, param); break;
                case 'search': renderSearch(viewport); break;
                case 'map': renderMap(viewport); break;
                default: window.location.hash = '#/feed';
            }
            lucide.createIcons();
        }

        // --- 4. CORE DATA ---
        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            await syncUser(session?.user);

            sb.auth.onAuthStateChange((_event, session) => syncUser(session?.user));
            sb.channel('public:posts').on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, async () => {
                await fetchPosts();
                if (window.location.hash === '#/feed') handleNavigation();
            }).subscribe();
            
            await fetchPosts();
            window.addEventListener('hashchange', handleNavigation);
            handleNavigation();

            navigator.geolocation.getCurrentPosition(
                (pos) => { state.currentLat = pos.coords.latitude; state.currentLng = pos.coords.longitude; },
                () => console.warn("Location service restricted")
            );
        }

        async function syncUser(user) {
            if (user) {
                const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
                state.user = { 
                    uid: user.id, username: profile?.username || user.email.split('@')[0], 
                    display_name: profile?.display_name || profile?.username || 'Citizen',
                    avatar_url: profile?.avatar_url, bio: profile?.bio, twitter: profile?.twitter, instagram: profile?.instagram, website: profile?.website
                };
                
                const { data: likes } = await sb.from('post_upvotes').select('post_id').eq('user_id', user.id);
                state.myLikes = likes ? likes.map(l => l.post_id) : [];
                fetchNotifications();
            } else { state.user = null; state.myLikes = []; }
            updateGlobalUI();
        }

        async function fetchPosts() {
            const { data: posts } = await sb.from('posts').select('*, comments(*)').order('created_at', { ascending: false });
            state.posts = posts || [];
        }

        async function fetchNotifications() {
            if (!state.user) return;
            const { data } = await sb.from('notifications').select('*').eq('user_id', state.user.uid).order('created_at', { ascending: false });
            state.notifications = data || [];
            document.getElementById('notif-badge')?.classList.toggle('hidden', !state.notifications.some(n => !n.is_read));
        }

        // --- 5. IMAGE & UTILITY LOGIC ---
        
        function parseImages(imgData) {
            if (!imgData) return [];
            if (Array.isArray(imgData)) return imgData;
            try {
                if (typeof imgData === 'string' && imgData.trim().startsWith('[')) {
                    const parsed = JSON.parse(imgData);
                    return Array.isArray(parsed) ? parsed : [imgData];
                }
                return [imgData];
            } catch (e) {
                return [imgData];
            }
        }

        function openFullscreen(images, index) {
            if (!images || !images.length) return;

            state.fsGallery = images;
            state.fsIndex = index;
            
            const overlay = document.getElementById('fullscreen-overlay');
            const img = document.getElementById('fullscreen-img');
            const prevBtn = document.getElementById('fs-prev');
            const nextBtn = document.getElementById('fs-next');
            const counter = document.getElementById('fs-counter');

            overlay.style.display = 'flex';
            img.src = images[index];
            counter.innerText = `${index + 1} / ${images.length}`;

            prevBtn.classList.toggle('hidden', images.length <= 1);
            nextBtn.classList.toggle('hidden', images.length <= 1);

            prevBtn.onclick = (e) => {
                e.stopPropagation();
                state.fsIndex = (state.fsIndex - 1 + images.length) % images.length;
                img.src = images[state.fsIndex];
                counter.innerText = `${state.fsIndex + 1} / ${images.length}`;
            };

            nextBtn.onclick = (e) => {
                e.stopPropagation();
                state.fsIndex = (state.fsIndex + 1) % images.length;
                img.src = images[state.fsIndex];
                counter.innerText = `${state.fsIndex + 1} / ${images.length}`;
            };
        }

        window.openGallery = (postId, index) => {
            const post = state.posts.find(p => p.id == postId);
            if (!post) return;
            const images = parseImages(post.image);
            openFullscreen(images, index);
        };

        function closeFullscreen() {
            document.getElementById('fullscreen-overlay').style.display = 'none';
        }

        function renderImageGrid(post) {
            const images = parseImages(post.image);
            if (!images || !images.length) return '';
            const gridClass = images.length >= 4 ? 'grid-4' : `grid-${images.length}`;
            
            return `
                <div class="image-grid ${gridClass}">
                    ${images.slice(0, 4).map((img, idx) => `
                        <div class="relative w-full h-full" onclick="event.stopPropagation(); window.openGallery(${post.id}, ${idx})">
                            <img src="${img}" class="grid-item">
                            ${idx === 3 && images.length > 4 ? `<div class="absolute inset-0 bg-black/50 flex items-center justify-center text-white font-bold text-xl">+${images.length - 4}</div>` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function handleImageSelection(event, previewId, buttonId) {
            const files = Array.from(event.target.files || []);
            if (!files.length) return;
            const preview = document.getElementById(previewId);
            const btn = document.getElementById(buttonId);
            state.isUploading = true;
            if (btn) btn.disabled = true;

            if (preview) {
                preview.innerHTML = `<div class="w-full h-full bg-slate-100 flex items-center justify-center text-slate-400 font-bold">${files.length} Photo(s)</div>`;
                const overlay = document.createElement('div');
                overlay.className = 'upload-overlay';
                overlay.id = 'uploading-ui';
                overlay.innerHTML = `<i data-lucide="upload-cloud" class="w-8 h-8 mb-2 animate-bounce"></i><span class="text-[9px] font-black uppercase tracking-widest text-center px-4">UPLOADING...</span>`;
                preview.appendChild(overlay);
                lucide.createIcons();
            }

            try {
                const uploadPromises = files.map(file => {
                    const formData = new FormData();
                    formData.append('image', file);
                    return fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData })
                        .then(res => res.json())
                        .then(data => data.success ? data.data.url : null);
                });
                const urls = await Promise.all(uploadPromises);
                state.tempImageUrls = urls.filter(u => u !== null);
                
                if (preview && state.tempImageUrls.length > 0) {
                    // Force clipping for avatar preview
                    const isAvatar = previewId === 'avatar-preview';
                    preview.innerHTML = `<img src="${state.tempImageUrls[0]}" class="w-full h-full object-cover ${isAvatar ? 'rounded-full' : ''}">`;
                }
                showToast(`Gallery ready`);
            } catch (err) { showToast("Upload failed"); } 
            finally { state.isUploading = false; if (btn) btn.disabled = false; document.getElementById('uploading-ui')?.remove(); }
        }

        // --- 6. RENDERERS ---

        function renderFeed(c) {
            c.innerHTML = `
                <div class="flex space-x-4 px-4 py-6 border-b border-slate-100 overflow-x-auto no-scrollbar bg-white md:border-none md:mt-4">
                    ${state.categories.map(cat => `<div class="flex flex-col items-center space-y-2 shrink-0 cursor-pointer group"><div class="story-ring group-active:scale-90 transition-transform"><div class="bg-white p-[2px] rounded-full"><div class="w-16 h-16 bg-slate-50 border border-slate-100 rounded-full flex items-center justify-center font-bold text-blue-600 text-[10px] uppercase">${cat[0]}</div></div></div><span class="text-[11px] text-slate-500 font-medium">${cat}</span></div>`).join('')}
                </div>
                <div class="space-y-6 md:space-y-8">
                    ${state.posts.map(post => {
                        const isLiked = state.myLikes.includes(post.id);
                        return `
                        <article class="post-card animate-in fade-in" id="post-${post.id}">
                            <div class="px-4 py-3 flex items-center justify-between">
                                <div class="flex items-center space-x-3 cursor-pointer" onclick="window.location.hash = '#/profile/${post.author}'">
                                    <div class="w-8 h-8 rounded-full border border-slate-200 bg-slate-50 flex items-center justify-center font-bold text-[10px] uppercase overflow-hidden text-slate-800">
                                        ${post.author_avatar ? `<img src="${post.author_avatar}" class="w-full h-full object-cover">` : post.author[0]}
                                    </div>
                                    <div class="flex flex-col">
                                        <p class="text-[13px] font-bold text-slate-900 leading-none">@${post.author}</p>
                                        <p class="text-[10px] text-slate-400 font-medium uppercase mt-1 tracking-wider">${post.location}</p>
                                    </div>
                                </div>
                                <i data-lucide="more-horizontal" class="w-5 h-5 text-slate-400"></i>
                            </div>

                            ${renderImageGrid(post)}

                            <div class="px-4 py-4">
                                <div class="flex justify-between items-center mb-4">
                                    <div class="flex items-center space-x-5">
                                        <i data-lucide="heart" id="heart-${post.id}" class="action-icon w-7 h-7 ${isLiked ? 'text-red-500 fill-red-500' : 'text-slate-900'}" onclick='handleUpvote(${JSON.stringify(post)})'></i>
                                        <i data-lucide="message-circle" class="action-icon w-7 h-7 text-slate-900" onclick="window.location.hash = '#/post/${post.id}'"></i>
                                        <i data-lucide="send" class="action-icon w-7 h-7 text-slate-900"></i>
                                    </div>
                                    <i data-lucide="bookmark" class="action-icon w-7 h-7 text-slate-900"></i>
                                </div>
                                
                                <p class="text-[14px] font-bold mb-2 text-slate-900" id="vote-count-${post.id}">${post.upvotes_count || 0} citizen votes</p>
                                <p class="text-[14px] leading-relaxed text-slate-800"><span class="font-bold mr-1 text-slate-900">@${post.author}</span>${post.description}</p>
                                
                                <div class="border-l-2 border-slate-100 pl-4 space-y-2 mt-4">
                                    ${(post.comments || []).slice(-2).map(com => `<p class="text-[12px] text-slate-600"><span class="font-bold text-slate-900">@${com.username}</span> ${com.content}</p>`).join('')}
                                </div>
                                <p class="text-[13px] text-slate-400 mt-2 cursor-pointer font-medium" onclick="window.location.hash = '#/post/${post.id}'">
                                    ${(post.comments?.length || 0) > 2 ? `View all ${post.comments.length} voices...` : 'Add voice...'}
                                </p>
                            </div>
                        </article>
                    `}).join('')}
                </div>`;
        }

        function renderMap(c) {
            c.innerHTML = `<div id="map-container" class="bg-slate-50"></div>`;
            setTimeout(() => {
                const map = L.map('map-container').setView([20.5937, 78.9629], 5);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);

                state.posts.forEach(post => {
                    if (post.latitude && post.longitude) {
                        const images = parseImages(post.image);
                        const gridClass = images.length >= 2 ? 'grid-2' : 'grid-1';
                        
                        const marker = L.marker([post.latitude, post.longitude]).addTo(map);
                        marker.bindPopup(`
                            <div class="flex flex-col bg-white">
                                <div class="image-grid ${gridClass} h-32 mb-2">
                                    ${images.slice(0, 2).map((img, idx) => `<img src="${img}" onclick="window.openGallery(${post.id}, ${idx})" class="grid-item cursor-pointer hover:opacity-80">`).join('')}
                                </div>
                                <div class="p-3">
                                    <p class="text-[10px] font-bold text-blue-600 uppercase mb-1">#${post.category}</p>
                                    <p class="text-xs font-bold text-slate-800 line-clamp-2 leading-snug">${post.description}</p>
                                    <button onclick="window.location.hash = '#/post/${post.id}'" class="mt-3 w-full py-2 bg-blue-600 text-white text-[10px] font-black uppercase rounded shadow-lg transition-transform active:scale-95">Open Report</button>
                                </div>
                            </div>
                        `);
                    }
                });
                if (state.currentLat) map.setView([state.currentLat, state.currentLng], 12);
            }, 100);
        }

        function renderCreate(c) {
            c.innerHTML = `
                <div class="flex flex-col h-full bg-white page-transition md:mt-4 md:border md:rounded-lg">
                    <header class="px-4 py-4 border-b flex justify-between items-center"><button onclick="window.history.back()" class="text-sm font-bold text-slate-500">Cancel</button><h2 class="text-sm font-bold uppercase tracking-widest text-slate-900 text-center">Broadcast</h2><button form="create-form" type="submit" id="submit-post-btn" class="text-blue-500 text-sm font-bold disabled:opacity-50" ${state.isUploading ? 'disabled' : ''}>Share</button></header>
                    <form id="create-form" onsubmit="handleCreate(event)" class="flex-1 p-6 space-y-6">
                        <div class="flex space-x-4 items-start pb-6 border-b border-slate-50">
                            <div class="w-24 h-24 bg-slate-50 rounded-lg flex items-center justify-center shrink-0 border border-slate-100 relative upload-wrapper shadow-inner" id="post-img-preview"><i data-lucide="camera" class="text-slate-300"></i><input type="file" id="c-file" accept="image/*" multiple required onchange="handleImageSelection(event, 'post-img-preview', 'submit-post-btn')"></div>
                            <textarea id="c-desc" placeholder="Describe the issue accurately..." required class="flex-1 text-[15px] p-1 outline-none border-none resize-none h-32 font-medium text-slate-900"></textarea>
                        </div>
                        <div class="space-y-4 pt-4">
                            <div class="flex items-center border-b pb-2"><i data-lucide="map-pin" class="w-4 h-4 text-slate-300 mr-3"></i><input id="c-loc" type="text" placeholder="Add Location (Area, City)" required class="w-full text-sm font-bold text-blue-600 outline-none"></div>
                            <div class="flex items-center border-b pb-2"><i data-lucide="tag" class="w-4 h-4 text-slate-300 mr-3"></i><select id="c-cat" class="w-full text-sm font-bold uppercase outline-none text-slate-700 bg-transparent">${state.categories.map(cat => `<option>${cat}</option>`).join('')}</select></div>
                        </div>
                    </form>
                </div>`;
            lucide.createIcons();
        }

        async function renderProfile(c, username) {
            let profile = state.user;
            let isOwnProfile = !username || username === state.user?.username;
            if (!isOwnProfile) {
                const { data } = await sb.from('profiles').select('*').eq('username', username).single();
                if (data) profile = data; else { window.location.hash = '#/feed'; return; }
            }
            const userPosts = state.posts.filter(p => p.author === profile.username);
            c.innerHTML = `
                <div class="flex flex-col h-full bg-white overflow-y-auto no-scrollbar md:mt-4">
                    <div class="px-6 py-10 flex flex-col border-b md:border md:rounded-t-lg">
                        <div class="flex items-center justify-between mb-6">
                            <div class="w-20 h-20 rounded-full bg-slate-900 text-white flex items-center justify-center text-4xl font-bold uppercase overflow-hidden">${profile.avatar_url ? `<img src="${profile.avatar_url}" class="w-full h-full object-cover">` : profile.username[0]}</div>
                            <div class="flex flex-1 justify-around text-center px-6">
                                <div><p class="font-bold text-lg leading-none">${userPosts.length}</p><p class="text-[12px] text-slate-500 mt-1 font-bold uppercase">Reports</p></div>
                                <div><p class="font-bold text-lg leading-none">${userPosts.reduce((a,b) => a + (b.upvotes_count || 0), 0)}</p><p class="text-[12px] text-slate-500 mt-1 font-bold uppercase">Impact</p></div>
                                ${isOwnProfile ? `<button onclick="sb.auth.signOut(); window.location.reload();" class="p-2 border rounded-full text-slate-400 hover:bg-slate-50 transition-colors"><i data-lucide="log-out" class="w-5 h-5"></i></button>` : ''}
                            </div>
                        </div>
                        <div class="space-y-1 mb-4"><h2 class="text-xl font-bold text-slate-900">${profile.display_name || profile.username}</h2><p class="text-blue-500 text-sm font-bold tracking-tight">@${profile.username}</p><p class="text-sm text-slate-600 mt-2 font-medium">${profile.bio || 'Monitoring National Progress'}</p></div>
                        <div class="flex flex-wrap mb-4">
                            ${profile.twitter ? `<a href="https://twitter.com/${profile.twitter}" target="_blank" class="social-chip"><i data-lucide="twitter" class="w-3 h-3 mr-2"></i>Twitter</a>` : ''}
                            ${profile.instagram ? `<a href="https://instagram.com/${profile.instagram}" target="_blank" class="social-chip"><i data-lucide="instagram" class="w-3 h-3 mr-2"></i>Instagram</a>` : ''}
                            ${profile.website ? `<a href="${profile.website.startsWith('http') ? profile.website : 'https://'+profile.website}" target="_blank" class="social-chip"><i data-lucide="globe" class="w-3 h-3 mr-2"></i>Website</a>` : ''}
                        </div>
                        ${isOwnProfile ? `<button onclick="window.location.hash='#/edit-profile'" class="w-full py-2 bg-slate-100 rounded-lg text-sm font-bold text-slate-900 hover:bg-slate-200 transition-all">Edit Profile</button>` : `<button class="w-full py-2 bg-blue-500 text-white rounded-lg text-sm font-bold">Connect</button>`}
                    </div>
                    <div class="grid grid-cols-3 gap-[2px] bg-slate-100 md:border md:rounded-b-lg overflow-hidden">
                        ${userPosts.map(p => {
                            const imgs = parseImages(p.image);
                            return `<div class="aspect-square bg-slate-50 cursor-pointer hover:opacity-90" onclick="window.location.hash='#/post/${p.id}'"><img src="${imgs[0]}" class="w-full h-full object-cover text-white"></div>`;
                        }).join('')}
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function renderEditProfile(c) {
            c.innerHTML = `
                <div class="flex flex-col h-full bg-white page-transition md:mt-4 md:border md:rounded-lg">
                    <header class="px-4 py-4 border-b flex justify-between items-center"><button onclick="window.history.back()" class="text-sm font-bold text-slate-500">Cancel</button><h2 class="text-sm font-bold uppercase tracking-widest text-slate-900">Edit Identity</h2><button form="edit-profile-form" type="submit" id="save-profile-btn" class="text-blue-500 text-sm font-bold disabled:opacity-50" ${state.isUploading ? 'disabled' : ''}>Update</button></header>
                    <form id="edit-profile-form" onsubmit="handleUpdateProfile(event)" class="flex-1 p-6 space-y-6 overflow-y-auto no-scrollbar pb-20">
                        <div class="flex flex-col items-center space-y-4">
                            <!-- Enforced Circle Clipping -->
                            <div class="avatar-lg rounded-full upload-wrapper overflow-hidden bg-slate-100 flex items-center justify-center border border-slate-100 shadow-inner" id="avatar-preview">
                                ${state.user.avatar_url ? `<img src="${state.user.avatar_url}" class="w-full h-full object-cover rounded-full">` : `<i data-lucide="user" class="text-slate-300"></i>`}
                                <input type="file" id="p-avatar" accept="image/*" onchange="handleImageSelection(event, 'avatar-preview', 'save-profile-btn')">
                            </div>
                            <p class="text-blue-500 text-xs font-bold uppercase tracking-widest">Change Photo</p>
                        </div>
                        <div class="space-y-4">
                            <div class="border-b pb-2"><label class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Display Name</label><input id="p-display-name" type="text" value="${state.user.display_name || ''}" placeholder="Real Name" class="w-full text-sm font-medium outline-none py-1 text-slate-900"></div>
                            <div class="border-b pb-2"><label class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Bio</label><textarea id="p-bio" rows="2" class="w-full text-sm font-medium outline-none py-1 resize-none text-slate-900">${state.user.bio || ''}</textarea></div>
                            <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-widest mt-8 mb-2 text-center">Social Connect</h3>
                            <div class="border-b pb-2 flex items-center"><i data-lucide="twitter" class="w-4 h-4 text-slate-300 mr-3"></i><input id="p-twitter" type="text" value="${state.user.twitter || ''}" placeholder="X handle" class="w-full text-sm font-medium outline-none text-slate-900"></div>
                            <div class="border-b pb-2 flex items-center"><i data-lucide="instagram" class="w-4 h-4 text-slate-300 mr-3"></i><input id="p-instagram" type="text" value="${state.user.instagram || ''}" placeholder="Instagram handle" class="w-full text-sm font-medium outline-none text-slate-900"></div>
                            <div class="border-b pb-2 flex items-center"><i data-lucide="globe" class="w-4 h-4 text-slate-300 mr-3"></i><input id="p-website" type="text" value="${state.user.website || ''}" placeholder="Personal Website" class="w-full text-sm font-medium outline-none text-slate-900"></div>
                        </div>
                    </form>
                </div>`;
            lucide.createIcons();
        }

        // --- 7. LOGIC HANDLERS ---

        async function handleUpvote(post) {
            if (!state.user) { window.location.hash = '#/auth'; return; }
            const heartEl = document.getElementById(`heart-${post.id}`);
            const countEl = document.getElementById(`vote-count-${post.id}`);
            const isLiked = state.myLikes.includes(post.id);
            const currentCount = parseInt(countEl?.innerText || 0);

            if (isLiked) {
                state.myLikes = state.myLikes.filter(id => id !== post.id);
                heartEl.className = "action-icon w-7 h-7 text-slate-900";
                countEl.innerText = `${Math.max(0, currentCount - 1)} citizen votes`;
                await sb.from('post_upvotes').delete().match({ post_id: post.id, user_id: state.user.uid });
            } else {
                state.myLikes.push(post.id);
                heartEl.className = "action-icon w-7 h-7 text-red-500 fill-red-500";
                countEl.innerText = `${currentCount + 1} citizen votes`;
                await sb.from('post_upvotes').insert({ post_id: post.id, user_id: state.user.uid });
            }
        }

        async function handleCreate(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-post-btn');
            if (!state.tempImageUrls.length) return showToast("Upload images first");
            btn.disabled = true; btn.innerText = "...";
            try {
                const postData = { 
                    author: state.user.username, author_id: state.user.uid, author_avatar: state.user.avatar_url || null, 
                    image: JSON.stringify(state.tempImageUrls), 
                    category: document.getElementById('c-cat').value,
                    location: document.getElementById('c-loc').value,
                    description: document.getElementById('c-desc').value,
                    status: 'Pending', latitude: state.currentLat, longitude: state.currentLng
                };
                await sb.from('posts').insert([postData]);
                showToast("Broadcast shared!");
                window.location.hash = '#/feed';
            } catch (err) { alert(err.message); btn.disabled = false; }
        }

        async function handleUpdateProfile(e) {
            e.preventDefault();
            const btn = document.getElementById('save-profile-btn');
            btn.disabled = true; btn.innerText = "...";
            try {
                const { error } = await sb.from('profiles').update({ 
                    display_name: document.getElementById('p-display-name').value,
                    bio: document.getElementById('p-bio').value,
                    avatar_url: state.tempImageUrls[0] || state.user.avatar_url,
                    twitter: document.getElementById('p-twitter').value,
                    instagram: document.getElementById('p-instagram').value,
                    website: document.getElementById('p-website').value,
                    updated_at: new Date() 
                }).eq('id', state.user.uid);
                if (error) throw error;
                showToast("Identity updated");
                window.location.hash = '#/profile';
            } catch (err) { alert(err.message); btn.disabled = false; }
        }

        // Shared SPA Utils
        function showToast(m) { const c = document.getElementById('toast-container'); if (!c) return; const t = document.createElement('div'); t.className = "bg-black text-white text-[11px] font-black uppercase tracking-widest px-6 py-3 rounded-full shadow-2xl mb-2 text-center animate-in slide-in-from-bottom-4 duration-300"; t.innerText = m; c.appendChild(t); setTimeout(() => t.remove(), 3000); }
        function updateGlobalUI() { const authS = document.getElementById('sidebar-auth-zone'); const mobA = document.getElementById('mobile-auth-header'); const sideA = document.getElementById('sidebar-avatar'); const navA = document.getElementById('nav-avatar-circle'); if (state.user) { authS.innerHTML = `<p class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center truncate px-2">@${state.user.username}</p>`; mobA.innerHTML = `<button onclick="window.location.hash='#/profile'" class="w-8 h-8 rounded-full bg-slate-900 text-white flex items-center justify-center text-[10px] font-bold uppercase overflow-hidden shadow-sm">${state.user.avatar_url ? `<img src="${state.user.avatar_url}" class="w-full h-full object-cover">` : state.user.username[0]}</button>`; sideA.innerHTML = state.user.avatar_url ? `<img src="${state.user.avatar_url}" class="w-full h-full object-cover">` : state.user.username[0]; navA.innerHTML = state.user.avatar_url ? `<img src="${state.user.avatar_url}" class="w-full h-full object-cover text-white">` : state.user.username[0]; } else { authS.innerHTML = `<button onclick="window.location.hash='#/auth'" class="btn-blue w-full text-[10px] uppercase tracking-widest font-black">Log In</button>`; mobA.innerHTML = `<i data-lucide="log-in" class="w-6 h-6 text-slate-900" onclick="window.location.hash='#/auth'"></i>`; sideA.innerHTML = `<i data-lucide="user" class="w-4 h-4 text-slate-400"></i>`; navA.innerHTML = `<i data-lucide="user" class="w-5 h-5 text-slate-400"></i>`; } }
        async function renderPostDetail(c, id) {
            const post = state.posts.find(p => p.id == id);
            if (!post) return window.location.hash = '#/feed';
            const { data: comments } = await sb.from('comments').select('*').eq('post_id', post.id).order('created_at', { ascending: true });
            const images = parseImages(post.image);
            c.innerHTML = `<div class="flex flex-col h-full bg-white page-transition md:mt-4 md:border md:rounded-lg"><header class="px-4 py-4 border-b flex items-center space-x-4 sticky top-0 bg-white z-10"><i data-lucide="arrow-left" class="action-icon w-6 h-6 text-slate-900" onclick="window.history.back()"></i><h2 class="text-sm font-bold uppercase tracking-widest">Discussion</h2></header><div class="flex-1 overflow-y-auto no-scrollbar pb-20"><div class="aspect-square bg-slate-50 flex overflow-x-auto snap-x snap-mandatory">${images.map((img, i) => `<img src="${img}" onclick="openFullscreen(${JSON.stringify(images)}, ${i})" class="w-full h-full object-cover snap-center flex-shrink-0 cursor-pointer text-white">`).join('')}</div><div class="p-4 border-b border-slate-50 flex items-start space-x-3"><div class="w-8 h-8 rounded-full bg-slate-900 text-white flex items-center justify-center font-bold text-[10px] shrink-0 uppercase">${post.author[0]}</div><div><p class="text-[14px] text-slate-800 leading-snug"><span class="font-bold mr-1 text-slate-900">@${post.author}</span>${post.description}</p><p class="text-[10px] text-slate-400 mt-2 font-bold uppercase tracking-widest">${post.location}</p></div></div><div class="p-4 space-y-6">${(comments || []).map(com => `<div class="flex items-start space-x-3"><div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-[10px] shrink-0 uppercase text-slate-900">${com.username[0]}</div><p class="text-[14px] leading-relaxed text-slate-800 font-medium"><span class="font-bold mr-1 text-slate-900">@${com.username}</span>${com.content}</p></div>`).join('')}</div></div><form onsubmit="submitComment(event, ${post.id}, '${post.author_id}')" class="p-3 border-t bg-white flex items-center space-x-3 fixed bottom-14 w-full md:relative md:bottom-0"><input name="comment" placeholder="Voice out..." required class="flex-1 text-[14px] outline-none border-none py-2 font-medium text-slate-900"><button type="submit" class="text-sm font-bold text-blue-500 action-icon px-2">Post</button></form></div>`;
            lucide.createIcons();
        }

        async function submitComment(e, pId, aId) { e.preventDefault(); const c = e.target.comment.value.trim(); if (!c || !state.user) return; await sb.from('comments').insert({ post_id: pId, user_id: state.user.uid, username: state.user.username, content: c }); e.target.reset(); fetchPosts(); handleNavigation(); }
        function renderSearch(c) { c.innerHTML = '<div class="p-10 text-center bg-white h-full"><h2 class="logo-font text-3xl mb-8 uppercase tracking-tighter text-slate-900 text-center">Discovery</h2><div class="relative max-w-md mx-auto"><i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300"></i><input placeholder="Filter regions..." class="w-full pl-12 pr-6 py-4 bg-slate-50 border border-slate-100 rounded-xl text-sm font-medium outline-none"></div><div class="grid grid-cols-2 gap-3 mt-10 max-w-md mx-auto">${state.categories.map(cat => `<div class="p-6 bg-white border border-slate-100 rounded-2xl text-[12px] font-bold uppercase tracking-widest text-slate-400 hover:text-blue-500 hover:border-blue-100 cursor-pointer transition-all shadow-sm text-center">#${cat}</div>`).join("")}</div></div>'; }
        function renderNotifications(c) { c.innerHTML = `<div class="p-6 bg-white h-full md:mt-4 md:border md:rounded-lg"><h2 class="text-xl font-bold mb-6 text-slate-900 uppercase tracking-widest">Activity</h2>${state.notifications.map(n => `<div class="flex items-center space-x-4 mb-4 pb-4 border-b border-slate-50 cursor-pointer hover:bg-slate-50" onclick="window.location.hash='#/post/${n.post_id}'"><div class="w-10 h-10 rounded-full bg-slate-900 flex items-center justify-center text-white"><i data-lucide="${n.type === 'upvote' ? 'heart' : 'message-circle'}" class="w-4 h-4"></i></div><div class="text-sm text-slate-800"><strong>@${n.actor_username}</strong> ${n.type === 'upvote' ? 'prioritized your report.' : 'commented on your report.'}</div></div>`).join('')}</div>`; }
        function renderAuth(c) { const isSignUp = state.authMode === 'signup'; c.innerHTML = `<div class="max-w-[350px] mx-auto flex flex-col justify-center h-full text-center p-6 bg-white"><h2 class="logo-font text-4xl mb-4 tracking-tighter text-slate-900 text-center">CivicGram</h2><form onsubmit="handleAuth(event)" class="space-y-3">${isSignUp ? '<input type="text" id="auth-user" placeholder="Pick @handle" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-[13px] outline-none">' : ''}<input type="email" id="auth-email" placeholder="Email Address" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-[13px] outline-none"><input type="password" id="auth-pass" placeholder="Secure Password" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-[13px] outline-none"><button type="submit" class="w-full py-2.5 btn-blue text-sm mt-3">${isSignUp ? 'Create Identity' : 'Log In'}</button></form><p onclick="state.authMode = '${isSignUp ? 'login' : 'signup'}'; handleNavigation();" class="text-[13px] font-bold text-blue-900 mt-6 cursor-pointer underline text-center">${isSignUp ? 'Login instead' : "New Hero? Join"}</p></div>`; }
        async function handleAuth(e) { e.preventDefault(); const email = document.getElementById('auth-email').value; const password = document.getElementById('auth-pass').value; const btn = e.target.querySelector('button'); try { if (state.authMode === 'signup') { const u = document.getElementById('auth-user').value; await sb.auth.signUp({ email, password, options: { data: { username: u } } }); showToast("Check email!"); } else { await sb.auth.signInWithPassword({ email, password }); showToast("Welcome!"); window.location.hash = '#/feed'; } } catch(err) { showToast(err.message); } }

        window.onload = init;
    </script>
</body>
</html>
