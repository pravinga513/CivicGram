<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicGram | National Action Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <!-- Leaflet Map Assets -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Cropper.js Assets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --civic-blue: #1e3a8a;
            --civic-accent: #3b82f6;
            --civic-bg: #f8fafc;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--civic-bg); 
            color: #1e293b;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #app-shell { display: flex; min-height: 100vh; width: 100%; }

        #sidebar {
            width: 280px; height: 100vh; position: fixed; left: 0; top: 0;
            background: #fff; border-right: 1px solid #e2e8f0; padding: 2.5rem 1.5rem;
            display: none; flex-direction: column; z-index: 100;
        }

        #main-content { flex: 1; margin-left: 0; max-width: 100%; display: flex; flex-direction: column; }
        #viewport { max-width: 800px; width: 100%; margin: 0 auto; padding: 1.5rem; padding-bottom: 120px; }

        @media (min-width: 1024px) {
            #sidebar { display: flex; }
            #main-content { margin-left: 280px; }
            #viewport { padding-top: 3rem; }
            #bottom-nav { display: none; }
            header { display: none; } 
        }

        .logo-font { font-weight: 800; letter-spacing: -1px; color: var(--civic-blue); }
        .page-transition { animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .nav-link {
            display: flex; align-items: center; padding: 0.85rem 1.25rem; margin-bottom: 0.5rem;
            border-radius: 16px; color: #64748b; font-weight: 700; transition: all 0.2s; cursor: pointer;
        }
        .nav-link:hover { background: #f8fafc; color: var(--civic-blue); }
        .nav-link.active { background: var(--civic-blue); color: #fff !important; box-shadow: 0 4px 15px rgba(30, 58, 138, 0.2); }

        .report-card {
            background: white; border-radius: 28px; border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); margin-bottom: 2.5rem; overflow: hidden;
        }

        .civic-grid { display: grid; gap: 4px; background: #fff; width: 100%; aspect-ratio: 16/10; overflow: hidden; cursor: pointer; }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; }
        .grid-3 .grid-item:first-child { grid-row: span 2; }
        .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .grid-item { width: 100%; height: 100%; object-fit: cover; }

        .status-pill { padding: 6px 14px; border-radius: 100px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }

        #fullscreen-overlay, #cropper-overlay, #camera-overlay {
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98);
            z-index: 2000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(12px);
        }

        .avatar-lg { width: 100px; height: 100px; border-radius: 50%; overflow: hidden; border: 4px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        .btn-action {
            display: flex; align-items: center; justify-content: center; padding: 0.85rem;
            border-radius: 18px; background: #f8fafc; color: #475569; font-weight: 800; font-size: 12px; transition: all 0.2s;
        }
        .btn-action:hover { background: #f1f5f9; color: var(--civic-blue); }
        .btn-action.active { color: #ef4444; background: #fef2f2; }
        .btn-action.saved { color: #3b82f6; background: #eff6ff; }

        .upload-area {
            border: 2px dashed #e2e8f0; border-radius: 32px; padding: 2.5rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #f8fafc; transition: all 0.2s; cursor: pointer; position: relative;
            overflow: hidden; min-height: 250px;
        }

        #video-feed {
            width: 100%; max-width: 500px; border-radius: 32px; background: black;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        
        .camera-trigger {
            width: 80px; height: 80px; border-radius: 50%; border: 6px solid rgba(255,255,255,0.2);
            background: white; display: flex; items-center justify-center; transition: all 0.2s;
        }
        .camera-trigger:active { transform: scale(0.9); }

        .profile-tab {
            padding: 14px 24px; font-size: 11px; font-weight: 800; text-transform: uppercase; border-bottom: 3px solid transparent; color: #94a3b8; transition: all 0.2s;
        }
        .profile-tab.active { color: var(--civic-blue); border-bottom-color: var(--civic-blue); }
        
        .custom-pin { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <!-- OVERLAYS -->
    <div id="fullscreen-overlay">
        <button onclick="closeFullscreen()" class="absolute top-8 right-8 text-white p-3 hover:bg-white/10 rounded-full transition-all"><i data-lucide="x" class="w-8 h-8"></i></button>
        <button id="fs-prev" class="absolute left-8 top-1/2 -translate-y-1/2 text-white p-5 hover:bg-white/10 rounded-full transition-all hidden"><i data-lucide="chevron-left" class="w-10 h-10"></i></button>
        <button id="fs-next" class="absolute right-8 top-1/2 -translate-y-1/2 text-white p-5 hover:bg-white/10 rounded-full transition-all hidden"><i data-lucide="chevron-right" class="w-10 h-10"></i></button>
        <img id="fullscreen-img" class="max-w-[95%] max-h-[85vh] object-contain rounded-2xl shadow-2xl">
        <div id="fs-counter" class="absolute bottom-12 text-white font-black bg-blue-600 px-8 py-2 rounded-full text-[10px] uppercase tracking-widest"></div>
    </div>

    <!-- GEOTAG CAMERA -->
    <div id="camera-overlay">
        <div class="absolute top-10 left-10 text-white z-10 pointer-events-none pr-10">
            <h3 class="font-black italic text-2xl uppercase tracking-tighter leading-none mb-2">Evidence Capture</h3>
            <p id="cam-address" class="text-[10px] font-black text-blue-400 uppercase tracking-widest leading-relaxed">Resolving Address...</p>
        </div>
        <button onclick="stopCamera()" class="absolute top-8 right-8 text-white p-4 hover:bg-white/10 rounded-full z-20 transition-all"><i data-lucide="x" class="w-8 h-8"></i></button>
        
        <video id="video-feed" autoplay playsinline class="mx-4"></video>
        
        <div class="mt-10 flex items-center space-x-12 z-10">
            <button onclick="captureFrame()" class="camera-trigger">
                <div class="w-full h-full rounded-full border-[6px] border-slate-900 m-1"></div>
            </button>
        </div>
    </div>

    <div id="cropper-overlay">
        <div class="w-full max-w-lg bg-white rounded-[48px] overflow-hidden shadow-2xl flex flex-col mx-4 text-center">
            <div class="px-10 py-8 border-b flex justify-between items-center bg-slate-50/50">
                <button onclick="closeCropper()" class="text-xs font-black uppercase text-slate-400">Cancel</button>
                <h3 class="font-black text-slate-900 uppercase text-[10px] tracking-widest">Identify Profile</h3>
                <button onclick="applyCrop()" class="bg-blue-600 text-white px-8 py-2 rounded-full font-black text-[10px] uppercase">Apply</button>
            </div>
            <div class="p-4 bg-slate-900 flex items-center justify-center min-h-[350px]"><img id="cropper-target" src="" class="max-w-full"></div>
        </div>
    </div>

    <div id="app-shell">
        <aside id="sidebar">
            <div class="flex items-center space-x-4 mb-16 px-2">
                <div class="w-12 h-12 bg-blue-700 rounded-[18px] flex items-center justify-center shadow-2xl shadow-blue-200"><i data-lucide="database" class="text-white w-6 h-6"></i></div>
                <h1 onclick="window.location.hash = '#/feed'" class="logo-font text-2xl cursor-pointer italic text-slate-900">CivicGram</h1>
            </div>
            <nav class="flex-1">
                <div onclick="window.location.hash = '#/feed'" class="nav-link" data-route="feed"><i data-lucide="activity"></i><span>Live Feed</span></div>
                <div onclick="window.location.hash = '#/map'" class="nav-link" data-route="map"><i data-lucide="map"></i><span>National Map</span></div>
                <div onclick="window.location.hash = '#/create'" class="nav-link" data-route="create"><i data-lucide="plus-square"></i><span>Create Report</span></div>
                <div onclick="window.location.hash = '#/notifications'" class="nav-link" data-route="notifications"><i data-lucide="bell"></i><span>Activity</span></div>
                <div onclick="window.location.hash = '#/u'" class="nav-link" data-route="u">
                    <div id="sidebar-avatar" class="w-6 h-6 rounded-full bg-slate-100 mr-4 flex items-center justify-center text-[10px] font-bold border border-slate-200 uppercase overflow-hidden text-slate-800"><i data-lucide="user"></i></div>
                    <span>My Profile</span>
                </div>
            </nav>
            <div id="sidebar-auth-zone" class="pt-8 border-t border-slate-100">
                <button onclick="window.location.hash = '#/auth'" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-widest">Sign In</button>
            </div>
        </aside>

        <div id="main-content">
            <header class="sticky top-0 bg-white/80 backdrop-blur-xl border-b border-slate-100 px-6 py-5 flex justify-between items-center z-50 lg:hidden">
                <div class="flex items-center space-x-2"><i data-lucide="database" class="text-blue-600 w-5 h-5"></i><h1 onclick="window.location.hash = '#/feed'" class="logo-font text-lg text-slate-900">CivicGram</h1></div>
                <div id="mobile-auth-header"><i data-lucide="user" class="w-6 h-6 text-slate-400 cursor-pointer" onclick="window.location.hash = '#/auth'"></i></div>
            </header>
            <main id="viewport" class="page-transition">
                <div class="h-96 flex items-center justify-center"><div class="w-10 h-10 border-4 border-slate-100 border-t-blue-600 rounded-full animate-spin"></div></div>
            </main>
            <nav id="bottom-nav" class="fixed bottom-0 w-full bg-white/90 backdrop-blur-xl border-t border-slate-100 flex justify-around items-center py-5 px-2 z-50 lg:hidden shadow-2xl">
                <button onclick="window.location.hash = '#/feed'" class="nav-btn p-2" data-route="feed"><i data-lucide="activity"></i></button>
                <button onclick="window.location.hash = '#/map'" class="nav-btn p-2" data-route="map"><i data-lucide="map"></i></button>
                <button onclick="window.location.hash = '#/create'" class="nav-btn p-3 bg-blue-700 text-white rounded-2xl shadow-lg -translate-y-4" data-route="create"><i data-lucide="plus"></i></button>
                <button onclick="window.location.hash = '#/notifications'" class="nav-btn p-2" data-route="notifications"><i data-lucide="bell"></i></button>
                <button onclick="window.location.hash = '#/u'" class="nav-btn p-2" data-route="u"><i data-lucide="user"></i></button>
            </nav>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-28 right-6 z-[3000] flex flex-col items-end pointer-events-none"></div>

    <script type="text/javascript">
        // --- 1. CONFIGURATION & STATE ---
        const IMGBB_API_KEY = '0abf983309932d2a2eeb289d53d7c55c';
        const SB_URL = 'https://lsfdeyayvdyohbjnqizt.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzZmRleWF5dmR5b2hiam5xaXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MDk5NTAsImV4cCI6MjA4NzI4NTk1MH0.7FonFhSDEqA6jfiT4JulxBZT_eIhIHvwoMycdyZlhC4';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const state = { 
            user: null, posts: [], notifications: [], myLikes: [], myFollows: [], mySaves: [],
            authMode: 'login', categories: ['Roads', 'Trash', 'Safety', 'Lights', 'Water', 'Parks'],
            isUploading: false, tempImageUrls: [],
            currentLat: 20.5937, currentLng: 78.9629, currentAddr: "Syncing Address...",
            currentView: null, profileTab: 'reports',
            cropper: null, activePreviewId: null, activeBtnId: null,
            stream: null
        };

        // --- 2. UTILITIES (Strict Declaration Order) ---
        
        function parseImages(imgData) {
            if (!imgData) return []; if (Array.isArray(imgData)) return imgData;
            try { if (typeof imgData === 'string' && imgData.trim().startsWith('[')) return JSON.parse(imgData); return [imgData]; } catch (e) { return [imgData]; }
        }

        function showToast(m) {
            const c = document.getElementById('toast-container');
            if (!c) return;
            const t = document.createElement('div');
            t.className = "bg-slate-900 text-white text-[10px] font-black uppercase tracking-widest px-8 py-4 rounded-2xl shadow-2xl mb-4 animate-in slide-in-from-right duration-300";
            t.innerText = m; c.appendChild(t); setTimeout(() => t.remove(), 4000);
        }

        async function reverseGeocode(lat, lng) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await res.json();
                return data.display_name || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            } catch (e) { return `${lat.toFixed(4)}, ${lng.toFixed(4)}`; }
        }

        function closeFullscreen() { document.getElementById('fullscreen-overlay').style.display = 'none'; }
        function closeCropper() { document.getElementById('cropper-overlay').style.display = 'none'; if (state.cropper) state.cropper.destroy(); }

        function updateGlobalUI() {
            const authS = document.getElementById('sidebar-auth-zone');
            const mobA = document.getElementById('mobile-auth-header');
            const sideA = document.getElementById('sidebar-avatar');
            if (state.user) {
                authS.innerHTML = `<button onclick="handleLogout()" class="w-full py-4 border border-slate-100 rounded-2xl font-black text-[10px] uppercase text-slate-400 hover:bg-slate-50 transition-colors">Sign Out</button>`;
                const img = `<img src="${state.user.avatar_url}" class="w-full h-full object-cover">`;
                mobA.innerHTML = `<div onclick="window.location.hash='#/u'" class="w-10 h-10 rounded-[14px] overflow-hidden bg-slate-100 flex items-center justify-center text-[10px] font-black uppercase cursor-pointer border border-white shadow-sm">${state.user.avatar_url ? img : state.user.username[0]}</div>`;
                sideA.innerHTML = state.user.avatar_url ? img : state.user.username[0];
            } else {
                authS.innerHTML = `<button onclick="window.location.hash='#/auth'" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Sign In</button>`;
                mobA.innerHTML = `<i data-lucide="user" class="w-6 h-6 text-slate-300 cursor-pointer" onclick="window.location.hash='#/auth'"></i>`;
                sideA.innerHTML = `<i data-lucide="user"></i>`;
            }
            lucide.createIcons();
        }

        // --- 3. DATABASE HANDLERS ---

        window.handlePostUpvote = async (postId) => {
            if (!state.user) { window.location.hash = '#/auth'; return; }
            const post = state.posts.find(p => p.id == postId); if (!post) return;
            const heartEls = document.querySelectorAll(`[id^="heart-${postId}"]`);
            const isLiked = state.myLikes.includes(postId);

            if (isLiked) {
                state.myLikes = state.myLikes.filter(id => id !== postId);
                heartEls.forEach(el => el.classList.remove('active'));
                await sb.from('post_upvotes').delete().match({ post_id: postId, user_id: state.user.id });
            } else {
                state.myLikes.push(postId);
                heartEls.forEach(el => el.classList.add('active', 'animate-pulse'));
                await sb.from('post_upvotes').insert({ post_id: postId, user_id: state.user.id });
                if (post.author_id !== state.user.id) await sb.from('notifications').insert({ user_id: post.author_id, actor_id: state.user.id, actor_username: state.user.username, post_id: postId, type: 'upvote' });
            }
        };

        window.handlePostSave = async (postId) => {
            if (!state.user) { window.location.hash = '#/auth'; return; }
            const isSaved = state.mySaves.includes(postId);
            const saveEls = document.querySelectorAll(`[id^="save-${postId}"]`);
            if (isSaved) {
                state.mySaves = state.mySaves.filter(id => id !== postId);
                saveEls.forEach(el => el.classList.remove('saved'));
                await sb.from('post_saves').delete().match({ post_id: postId, user_id: state.user.id });
                showToast("Removed Archive");
            } else {
                state.mySaves.push(postId);
                saveEls.forEach(el => el.classList.add('saved'));
                await sb.from('post_saves').insert({ post_id: postId, user_id: state.user.id });
                showToast("Saved Archive");
            }
        };

        window.handleShare = async (postId) => {
            const url = `${window.location.origin}${window.location.pathname}#/post/${postId}`;
            if (navigator.share) {
                try { await navigator.share({ title: 'CivicGram Case', text: 'Action Required', url }); } catch(e) {}
            } else {
                const el = document.createElement('textarea'); el.value = url; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                showToast("URL Copied to Clipboard");
            }
        };

        window.handleFollow = async (targetUserId) => {
            if (!state.user) { window.location.hash = '#/auth'; return; }
            const isFollowing = state.myFollows.includes(targetUserId);
            if (isFollowing) {
                state.myFollows = state.myFollows.filter(id => id !== targetUserId);
                await sb.from('follows').delete().match({ follower_id: state.user.id, following_id: targetUserId });
            } else {
                state.myFollows.push(targetUserId);
                await sb.from('follows').insert({ follower_id: state.user.id, following_id: targetUserId });
                showToast("Connection Synced");
            }
            const parts = window.location.hash.split('/');
            if (parts[1] === 'u') renderProfile(document.getElementById('viewport'), parts[2]);
        };

        // --- 4. RENDERERS ---

        function renderFeed(c) {
            c.innerHTML = `
                <div class="flex space-x-3 mb-10 overflow-x-auto no-scrollbar pb-2">
                    ${state.categories.map(cat => `<button class="shrink-0 px-6 py-3 bg-white border border-slate-100 rounded-2xl text-[11px] font-black uppercase text-slate-500 hover:text-blue-600 transition-all shadow-sm">#${cat}</button>`).join('')}
                </div>
                <div class="space-y-10">
                    ${state.posts.map(post => {
                        const isLiked = state.myLikes.includes(post.id);
                        const isSaved = state.mySaves.includes(post.id);
                        const imgs = parseImages(post.image);
                        return `
                        <article class="report-card animate-in fade-in" id="post-${post.id}">
                            <div class="p-8 flex items-center justify-between">
                                <div class="flex items-center space-x-4 cursor-pointer" onclick="window.location.hash = '#/u/${post.author}'">
                                    <div class="w-14 h-14 rounded-[20px] bg-slate-50 flex items-center justify-center font-bold text-slate-400 overflow-hidden shadow-inner border border-slate-100">
                                        ${post.author_avatar ? `<img src="${post.author_avatar}" class="w-full h-full object-cover">` : post.author[0]}
                                    </div>
                                    <div class="flex flex-col">
                                        <div class="flex items-center">
                                            <div class="w-4 h-4 rounded-full overflow-hidden bg-slate-200 mr-2 flex items-center justify-center text-[6px] font-black">
                                                 ${post.author_avatar ? `<img src="${post.author_avatar}" class="w-full h-full object-cover">` : 'C'}
                                            </div>
                                            <p class="text-sm font-black text-slate-900 leading-tight italic uppercase tracking-tighter">@${post.author}</p>
                                        </div>
                                        <div class="flex items-center space-x-2 mt-1.5">
                                            <span class="status-pill ${post.status === 'Pending' ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600'}">${post.status}</span>
                                            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">• ${post.location}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="civic-grid ${imgs.length >= 4 ? 'grid-4' : `grid-${imgs.length}`}" onclick="window.handlePostGallery(${post.id}, 0)">
                                ${imgs.slice(0, 4).map((img, idx) => `<div class="relative w-full h-full"><img src="${img}" class="grid-item">${idx === 3 && imgs.length > 4 ? `<div class="absolute inset-0 bg-black/60 flex items-center justify-center text-white font-black text-xl">+${imgs.length - 4}</div>` : ''}</div>`).join('')}
                            </div>
                            <div class="p-8">
                                <p class="text-[16px] leading-relaxed text-slate-700 font-medium mb-8">${post.description}</p>
                                <div class="grid grid-cols-4 gap-2 border-t border-slate-50 pt-8">
                                    <button id="heart-${post.id}" onclick="window.handlePostUpvote(${post.id})" class="btn-action ${isLiked ? 'active' : ''}"><i data-lucide="shield-alert" class="w-5 h-5 mr-2"></i><span id="vote-count-${post.id}">${post.upvotes_count || 0}</span></button>
                                    <button onclick="window.location.hash = '#/post/${post.id}'" class="btn-action"><i data-lucide="message-square" class="w-5 h-5 mr-2"></i><span>${post.comments?.length || 0}</span></button>
                                    <button id="save-${post.id}" onclick="window.handlePostSave(${post.id})" class="btn-action ${isSaved ? 'saved' : ''}"><i data-lucide="bookmark" class="w-5 h-5"></i></button>
                                    <button onclick="window.handleShare(${post.id})" class="btn-action"><i data-lucide="share-2" class="w-5 h-5"></i></button>
                                </div>
                            </div>
                        </article> `}).join('')}
                </div>`;
            lucide.createIcons();
        }

        async function renderPostDetail(c, id) {
            const post = state.posts.find(p => p.id == id);
            if (!post) return window.location.hash = '#/feed';
            const { data: comments } = await sb.from('comments').select('*').eq('post_id', post.id).order('created_at', { ascending: true });
            const images = parseImages(post.image);
            const isLiked = state.myLikes.includes(post.id);

        // --- 5. CAMERA & CAPTURE LOGIC ---

        async function startCamera() {
            const overlay = document.getElementById('camera-overlay');
            const video = document.getElementById('video-feed');
            overlay.style.display = 'flex';
            try {
                state.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } }, audio: false });
                video.srcObject = state.stream;
                state.currentAddr = await reverseGeocode(state.currentLat, state.currentLng);
                document.getElementById('cam-address').innerText = state.currentAddr.toUpperCase();
            } catch (e) { showToast("Camera Access Denied"); stopCamera(); }
        }

        function stopCamera() {
            if (state.stream) state.stream.getTracks().forEach(t => t.stop());
            document.getElementById('camera-overlay').style.display = 'none';
        }

        async function captureFrame() {
            const video = document.getElementById('video-feed');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            // Draw Mirror-corrected frame
            ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0);
            ctx.setTransform(1, 0, 0, 1, 0, 0);

            // Adaptive Meta Overlay
            const barHeight = canvas.height * 0.15;
            const padding = canvas.width * 0.05;
            const fontSize = Math.max(12, Math.floor(canvas.height * 0.025));
            
            ctx.fillStyle = "rgba(15, 23, 42, 0.75)";
            ctx.fillRect(0, canvas.height - barHeight, canvas.width, barHeight);
            
            ctx.fillStyle = "white";
            ctx.font = `black ${fontSize}px Plus Jakarta Sans`;
            
            // Multi-line wrap for address
            const addrWords = state.currentAddr.split(' ');
            let line = '';
            let y = canvas.height - (barHeight * 0.65);
            for (let word of addrWords) {
                let testLine = line + word + ' ';
                if (ctx.measureText(testLine).width > (canvas.width - (padding * 2))) {
                    ctx.fillText(line, padding, y);
                    line = word + ' ';
                    y += fontSize * 1.2;
                } else { line = testLine; }
            }
            ctx.fillText(line, padding, y);
            
            ctx.fillStyle = "#3b82f6";
            ctx.fillText(`CIVICGRAM TRACE: ${new Date().toLocaleString().toUpperCase()}`, padding, canvas.height - (barHeight * 0.15));

            const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
            
            // UI Tray
            const grid = document.getElementById('multi-preview-grid');
            const placeholder = document.getElementById('upload-placeholder');
            const uploadLayer = document.getElementById('cam-upload-overlay');
            
            grid.classList.remove('hidden');
            if (placeholder) placeholder.style.display = 'none';
            if (uploadLayer) uploadLayer.classList.remove('hidden');

            const wrap = document.createElement('div');
            wrap.className = "relative group h-24";
            wrap.innerHTML = `<img src="${dataUrl}" class="w-full h-full object-cover rounded-xl border border-slate-100 shadow-sm"><button onclick="window.downloadBlob('${dataUrl}')" class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center rounded-xl transition-opacity text-white font-black text-[9px] uppercase">Download</button>`;
            grid.appendChild(wrap);

            // Cloud Sync
            state.isUploading = true;
            try {
                const fd = new FormData();
                fd.append('image', dataUrl.split(',')[1]);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
                const d = await res.json();
                if (d.success) { state.tempImageUrls.push(d.data.url); showToast("Evidence Synced"); }
            } finally { state.isUploading = false; if(uploadLayer) uploadLayer.classList.add('hidden'); stopCamera(); }
        }

        window.downloadBlob = (base64) => {
            const l = document.createElement('a'); l.href = base64; l.download = `CivicGram_Evidence_${Date.now()}.jpg`; l.click();
        };

        // --- 6. NAVIGATION & APP ENGINE ---

        async function handleNavigation() {

            if (state.currentView === viewKey && route !== 'feed') return; 
            state.currentView = viewKey;

            if (['create', 'notifications', 'edit-profile'].includes(route) && !state.user) { window.location.hash = '#/auth'; return; }
            document.querySelectorAll('.nav-link, .nav-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-route') === route));

                    case 'create': renderCreate(viewport); break;
                    case 'u': await renderProfile(viewport, param); break;
                    case 'edit-profile': renderEditProfile(viewport); break;
                    case 'notifications': renderNotifications(viewport); break;
                    case 'post': await renderPostDetail(viewport, param); break;
                    case 'search': renderSearch(viewport); break;
                    case 'map': renderMap(viewport); break;
                    default: window.location.hash = '#/feed';
                }
            }
            lucide.createIcons();
        }

        async function applyCrop() {
            const canvas = state.cropper.getCroppedCanvas({ width: 500, height: 500 });
            closeCropper();
            state.isUploading = true;
            canvas.toBlob(async (blob) => {
                const fd = new FormData(); fd.append('image', blob);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
                const d = await res.json();
                if (d.success) { state.tempImageUrls = [d.data.url]; showToast("Avatar Contextualized"); }
                state.isUploading = false;
            });
        }

        function renderSearch(c) { c.innerHTML = '<div class="p-24 text-center"><h2 class="text-3xl font-black text-slate-900 uppercase italic mb-10 tracking-tighter text-slate-900">Discovery Hub</h2><input placeholder="Filter reports..." class="w-full p-8 bg-white rounded-[40px] border border-slate-100 outline-none font-black text-blue-700 tracking-tight placeholder:text-slate-200 shadow-xl"></div>'; lucide.createIcons(); }
        function renderNotifications(c) { c.innerHTML = `<div class="bg-white rounded-[48px] border border-slate-100 p-12 h-full page-transition text-slate-900"><h2 class="text-2xl font-black text-slate-900 uppercase italic mb-12">Action Logs</h2><div class="space-y-6">${state.notifications.map(n => `<div class="flex items-center space-x-6 p-6 bg-slate-50 rounded-[32px] cursor-pointer hover:bg-slate-100 transition-all shadow-sm" onclick="window.location.hash='#/post/${n.post_id}'"><div class="w-14 h-14 rounded-[20px] bg-slate-900 flex items-center justify-center text-white shadow-xl shadow-slate-200"><i data-lucide="${n.type === 'upvote' ? 'shield-alert' : 'message-square'}" class="w-6 h-6"></i></div><div class="text-sm font-bold text-slate-700 leading-tight"><strong>@${n.actor_username}</strong> backed your report action.</div></div>`).join('')}</div></div>`; lucide.createIcons(); }
        function renderAuth(c) { const isSignUp = state.authMode === 'signup'; c.innerHTML = `<div class="max-w-md mx-auto py-24 text-center px-8 page-transition"><div class="w-20 h-20 bg-blue-700 rounded-[32px] flex items-center justify-center mx-auto mb-8 shadow-2xl rotate-3 text-white"><i data-lucide="shield-check" class="text-white w-10 h-10"></i></div><h2 class="text-4xl font-black text-slate-900 italic uppercase">${isSignUp ? 'Establish ID' : 'Identify'}</h2><form onsubmit="handleAuth(event)" class="space-y-4">${isSignUp ? '<div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm"><input type="text" id="auth-user" placeholder="@handle" required class="w-full outline-none font-bold"></div>' : ''}<div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm"><input type="email" id="email" placeholder="Email" required class="w-full outline-none font-bold"></div><div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm"><input type="password" id="password" placeholder="Pass" required class="w-full outline-none font-bold"></div><button type="submit" class="w-full py-5 bg-slate-900 text-white rounded-3xl font-black uppercase tracking-widest shadow-xl">Identify</button></form><p onclick="state.authMode = '${isSignUp ? 'login' : 'signup'}'; state.currentView = null; handleNavigation();" class="text-xs font-black text-blue-600 mt-10 cursor-pointer uppercase underline">Switch Portal</p></div>`; lucide.createIcons(); }
        function renderEditProfile(c) { c.innerHTML = `<div class="bg-white rounded-[40px] border border-slate-100 overflow-hidden shadow-sm page-transition text-slate-900"><header class="p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/50 text-slate-900"><h2 class="text-xs font-black uppercase text-slate-900">Refine ID</h2><button form="edit-profile-form" type="submit" id="save-profile-btn" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase shadow-lg">Update</button></header><form id="edit-profile-form" onsubmit="handleUpdateProfile(event)" class="p-8 space-y-8"><div class="flex flex-col items-center space-y-6"><div class="avatar-lg upload-wrapper shadow-inner" id="avatar-preview">${state.user.avatar_url ? `<img src="${state.user.avatar_url}" class="w-full h-full object-cover">` : `<div class="w-full h-full bg-slate-100 flex items-center justify-center text-slate-300"><i data-lucide="user"></i></div>`}<input type="file" id="p-avatar" accept="image/*" onchange="handleImageSelection(event, 'avatar-preview', 'save-profile-btn')"></div></div><div class="space-y-6 text-slate-900"><div class="bg-slate-50 p-6 rounded-[24px] text-slate-900"><label class="block text-[8px] text-slate-400 font-black uppercase mb-2">Display Name</label><input id="p-display-name" type="text" value="${state.user.display_name || ''}" class="w-full bg-transparent border-none outline-none font-bold text-slate-900"></div><div class="bg-slate-50 p-6 rounded-[24px] text-slate-900"><label class="block text-[8px] text-slate-400 font-black uppercase mb-2">Bio</label><textarea id="p-bio" rows="2" class="w-full bg-transparent border-none outline-none font-bold text-slate-900 resize-none">${state.user.bio || ''}</textarea></div></div></form></div>`; lucide.createIcons(); }

        window.onload = init;
    </script>
</body>
</html>
